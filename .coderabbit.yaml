# ==============================================================================
# CodeRabbit Global Configuration
# ==============================================================================

# 언어 설정
language: "ko-KR"

# 리뷰 스타일
reviews:
  profile: "chill"         # [Profile] chill(부드럽게) 또는 assertive(깐깐하게)
  request_changes_workflow: false # [Request changes workflow] 자동 승인 여부
  abort_on_close: true     # [Abort on close] PR이 닫히면 리뷰 중단
  disable_cache: false     # [Disable cache] 종속성/코드 캐시 비활성화

  # 워크스루(Walkthrough) & 요약 시각화 설정
  collapse_walkthrough: true       # [Collapse walkthrough] 요약 내용을 <details>로 접기
  sequence_diagrams: true          # [Sequence diagrams] Mermaid 시퀀스 다이어그램 생성
  estimate_code_review_effort: true # [Estimate code review effort] 예상 공수(시간) 측정
  assess_linked_issues: true       # [Assess linked issues] 연결된 이슈 해결 여부 진단
  related_issues: true             # [Related issues] 연관된 과거 이슈 추천
  related_prs: true                # [Related PRs] 연관된 과거 PR 추천

  # PR 요약문(Summary) 상세 커스텀
  high_level_summary: true         # [High level summary] 상위 수준 요약 켜기
  high_level_summary_in_walkthrough: true # [High level summary in walkthrough] 요약을 설명란이 아닌 댓글에 달기
  high_level_summary_placeholder: "@coderabbitai summary" # [High level summary placeholder] 치환할 키워드
  high_level_summary_instructions: | # [High level summary instructions] 요약문 작성 지시사항
    Concise release notes as a bullet-point list.

  # 파일 필터링 [Path filters]
  # (글로브 패턴 사용, !로 시작하면 리뷰 제외)
  path_filters:
    - "**/*.java"                  # 자바 소스코드는 무조건 포함
    - "!*.md"                      # 마크다운 문서 제외