services:
  mysql:
    image: mysql:8.0
    container_name: nl2sql-mysql
    restart: always
    env_file:
      - .env
      - .secret.env
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3316:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 6s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: nl2sql-app
    container_name: nl2sql-app
    restart: no
    env_file:
      - .env
      - .secret.env
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs

volumes:
  mysql_data:
